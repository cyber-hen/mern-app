
services:
  server:
    build:
      context: ./server
    container_name: mern-app-server
    user: node
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://db:27017/mern-app
    ports:
      - 5001:5000
    depends_on:
      - db
    networks:
      - mern-network

  client:
    build:
      context: ./client
    container_name: mern-app-client
    environment:
      NODE_ENV: production
    user: node
    ports:
      - 3000:3000
    depends_on:
      - server
    networks:
      - mern-network

  db:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: mern-app
      MONGO_URI_ENV: mongodb://db:27017/mern-app
    ports:
      - 27017:27017
    volumes:
      - db-data:/data/db
    networks:
      - mern-network
    restart: always
    healthcheck:
      test: [ "CMD", "Data_Base_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  db-data:
  
networks:
  mern-network:
    driver: bridge



